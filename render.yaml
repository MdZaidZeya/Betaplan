services:
  - type: web
    name: betaplan-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: DATA_DIR
        value: /var/data/betaplan
    disk:
      name: betaplan-data
      mountPath: /var/data/betaplan
      sizeGB: 1
